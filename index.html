<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학번2QR | xxxjjhhh</title>
    <link rel="stylesheet" href="/main.css">
    <script src="/qr.js"></script>
</head>
<body>
    <div class="textBox">
        <input type="text" id="qr-text1" placeholder="학번을 입력해 주세요"><br>
        <input type="text" id="qr-text2" placeholder="학번을 입력해 주세요"><br>
        <input type="text" id="qr-text3" placeholder="학번을 입력해 주세요"><br>
        <input type="text" id="qr-text4" placeholder="학번을 입력해 주세요"><br>
        <button onclick="makeQr()">QR 생성</button>
    </div>
    <br>
    <div class="qrBox">
        <img src="" alt="" id="img1">
    </div>
    <br>
    <div class="qrBox">
        <img src="" alt="" id="img2">
    </div>
    <br>
    <div class="qrBox">
        <img src="" alt="" id="img3">
    </div>
    <br>
    <div class="qrBox">
        <img src="" alt="" id="img4">
    </div>
    <script>
        function makeQr() {

            let stnum1 = document.getElementById('qr-text1').value;
            let stnum2 = document.getElementById('qr-text2').value;
            let stnum3 = document.getElementById('qr-text3').value;
            let stnum4 = document.getElementById('qr-text4').value;

            if (stnum1.length != 0) {

                document.getElementById('img1').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=a${stnum1}`
            }
            if (stnum2.length != 0) {

                document.getElementById('img2').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=a${stnum2}`
            }
            if (stnum3.length != 0) {

                document.getElementById('img3').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=a${stnum3}`
            }
            if (stnum4.length != 0) {

                document.getElementById('img4').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=a${stnum4}`
            }
        }
    </script>
</body>
</html>
